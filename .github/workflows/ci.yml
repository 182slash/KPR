name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ─── Frontend checks ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Type Check & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build check
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/v1
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: placeholder
          NEXT_PUBLIC_MIDTRANS_CLIENT_KEY: placeholder
          NEXT_PUBLIC_MIDTRANS_SNAP_URL: https://app.sandbox.midtrans.com/snap/snap.js
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci_secret_placeholder_not_real_32chars

  # ─── Backend checks ───────────────────────────────────────────────────────────
  backend:
    name: Backend — Type Check & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kpr_test

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

  # ─── Security audit ───────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Audit frontend
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Audit backend
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true
